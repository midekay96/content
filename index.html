<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Psychinch Content Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #020617;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 40px;
    }

    .hero p {
      font-size: 18px;
      color: #94a3b8;
    }

    .btn {
      background: #22c55e;
      padding: 12px 20px;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }

    .box {
      background: #020617;
      margin: 40px;
      padding: 20px;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: black;
      margin-top: 40px;
    }

    a {
      color: #22c55e;
    }
  </style>

<body>

<header>
Psychinch Content Studio
</header>

<div class="hero">
  <h1>Upload TikTok Posts Easily</h1>
  <p>
    Psychinch Content Studio allows users to connect their TikTok account
    and upload posts directly from the dashboard.
  </p>

  <button class="btn">Connect TikTok</button>
</div>

<div class="box">
  <h2>Dashboard</h2>
  <p>User can upload video and publish to TikTok.</p>

  <input type="file">
  <br><br>
  <button class="btn">Upload Post</button>
</div>

<div class="box">
  <a href="privacy.html">Privacy Policy</a> |
  <a href="terms.html">Terms of Service</a>
</div>

<footer>
© 2026 Psychinch Content Studio

</html>
